<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChronosRift</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-yellow: #f2c225;
        --color-beige: #e9dfc9;
        --color-grey: #808080;
        --color-black: #070b12;
      }
      @layer base {
        header,
        main,
        footer {
          @apply bg-black text-grey;
        }
      }
      @layer components {
        .className {
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>Header</div>
    </header>
    <main>
      <div>Main</div>
    </main>
    <footer>
      <div>Footer</div>
    </footer>
  </body>
</html>
